<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AI Market Intelligence</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f4f7fb;
  margin:0;
  padding:32px;
  color:#182230;
}

.wrap{
  max-width:920px;
  margin:auto;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:30px;
  box-shadow:0 8px 30px rgba(0,0,0,.08);
}

label{
  display:block;
  font-weight:700;
  margin:18px 0 7px;
}

input,
select,
textarea{
  width:100%;
  box-sizing:border-box;
  padding:12px;
  border:1px solid #ccd4df;
  border-radius:9px;
  font-size:15px;
}

textarea{
  min-height:105px;
}

button{
  margin-top:22px;
  padding:13px 18px;
  border:0;
  border-radius:10px;
  background:#1f4e78;
  color:white;
  font-weight:700;
  cursor:pointer;
}

button:hover{
  background:#163a59;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.note{
  font-size:13px;
  color:#5d6a79;
  background:#eef4fa;
  padding:12px;
  border-radius:8px;
}

#output{
  background:#101827;
  color:#e8eef7;
  padding:25px;
  border-radius:12px;
  margin-top:20px;
  line-height:1.6;
}

#output h2,
#output h3{
  color:white;
}

.source{
  background:#1b2638;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

.exposure{
  background:#24344d;
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}

.score{
  font-size:40px;
  font-weight:bold;
}

.source a{
  color:#7db7ff;
  word-break:break-all;
}

.download{
  margin-left:15px;
  margin-top:22px;
}

.loading-status{
  font-weight:700;
  margin-bottom:10px;
}

.loading-time{
  color:#aebbd0;
  font-size:14px;
}

</style>

</head>

<body>

<div class="wrap">

<div class="card">

<h1>
AI Market Intelligence Request
</h1>

<p class="note">

<strong>Market rule:</strong>

China means Mainland China using Simplified Chinese sources.
Hong Kong is separate.

</p>

<label>Brand</label>

<input id="brand" placeholder="e.g., MOFLIN">

<label>Keywords</label>

<textarea
  id="keywords"
  placeholder="e.g., pricing, complaints, reviews, sales"
></textarea>

<label>Market / Language</label>

<select id="market_language">

<option>Japan (Japanese)</option>
<option>China (Chinese)</option>
<option>Hong Kong (Traditional Chinese)</option>
<option>United States (English)</option>
<option>Global (Multi-language)</option>

</select>

<label>Time Period</label>

<select id="time_period">

<option>Last 24 hours</option>
<option>Last week</option>
<option>Last month</option>
<option>Last 6 months</option>
<option selected>Last year</option>
<option>All time</option>

</select>

<label>Source Types</label>

<select id="source_types">

<option selected>All</option>
<option>Reddit</option>
<option>YouTube</option>
<option>Note Blogs</option>
<option>Personal Websites</option>
<option>Forums</option>
<option>Social Media</option>
<option>Retailers</option>
<option>News / Media</option>
<option>Official Websites</option>

</select>

<label>Report Type</label>

<select id="report_type">

<option selected>Full market report</option>
<option>Latest updates only</option>
<option>Positive and negative feedback</option>
<option>Sales and pricing</option>
<option>Competitor comparison</option>

</select>

<label>Requested By</label>

<input id="requested_by" placeholder="Name">

<button id="run">
Run Research
</button>

<button id="downloadMarkdown" class="download">
Download Markdown
</button>

<button onclick="window.location.href='source-library.html'">
📂 View All Sources Found
</button>

<h2>
Result
</h2>

<div id="output">
Waiting for a request...
</div>

</div>

</div>

<script>

/*
Use the test URL only while testing.

Before clicking Run Research:
1. Open n8n.
2. Open the Webhook node.
3. Click "Listen for test event".
4. Then click Run Research on the website.

For the live website, replace /webhook-test/ with /webhook/
and activate/publish the n8n workflow.
*/

const WEBHOOK_URL =
"https://ttocs1ck.app.n8n.cloud/webhook-test/ai-market-intelligence";


function clean(text){

  if(text === null || text === undefined){
    return "";
  }

  return String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");

}


function safeUrl(url){

  if(!url){
    return "#";
  }

  try{

    const parsedUrl = new URL(url);

    if(
      parsedUrl.protocol === "http:" ||
      parsedUrl.protocol === "https:"
    ){
      return parsedUrl.href;
    }

  } catch(error){

    console.warn("Invalid source URL:", url);

  }

  return "#";

}


function formatElapsedTime(seconds){

  const minutes = Math.floor(seconds / 60);
  const remainingSeconds = seconds % 60;

  if(minutes === 0){
    return `${remainingSeconds} seconds`;
  }

  return `${minutes} minute${minutes === 1 ? "" : "s"} ${remainingSeconds} seconds`;

}


// MARKDOWN DOWNLOAD

document
  .getElementById("downloadMarkdown")
  .addEventListener("click", function(){

    const output =
      document.getElementById("output");

    if(
      output.innerText.trim() === "" ||
      output.innerText.includes("Waiting for a request") ||
      output.innerText.includes("Research is running")
    ){

      alert("Please run research and wait for the report first.");
      return;

    }

    const markdown =
      output.innerText;

    const blob =
      new Blob(
        [markdown],
        {
          type: "text/markdown;charset=utf-8"
        }
      );

    const url =
      URL.createObjectURL(blob);

    const link =
      document.createElement("a");

    const timestamp =
      new Date()
        .toISOString()
        .slice(0,10);

    link.href = url;

    link.download =
      `AI_Market_Intelligence_Report_${timestamp}.md`;

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

    URL.revokeObjectURL(url);

});


// RUN RESEARCH

document
  .getElementById("run")
  .onclick = async () => {

    const output =
      document.getElementById("output");

    const runButton =
      document.getElementById("run");

    const brand =
      document.getElementById("brand").value.trim();

    if(!brand){

      output.innerHTML = `
        <h3>Missing Brand</h3>
        <p>Please enter a brand or product name.</p>
      `;

      return;

    }

    const payload = {

      brand,

      keywords:
        document.getElementById("keywords").value.trim(),

      market_language:
        document.getElementById("market_language").value,

      time_period:
        document.getElementById("time_period").value,

      source_types:
        document.getElementById("source_types").value,

      report_type:
        document.getElementById("report_type").value,

      requested_by:
        document.getElementById("requested_by").value.trim()

    };

    runButton.disabled = true;
    runButton.textContent = "Research Running...";

    let elapsedSeconds = 0;

    output.innerHTML = `
      <div class="loading-status">
        Research is running...
      </div>

      <div class="loading-time" id="loadingTime">
        Time elapsed: 0 seconds
      </div>

      <p>
        The system is collecting sources, analyzing feedback,
        and generating your report. This may take several minutes.
      </p>
    `;

    const timer = setInterval(() => {

      elapsedSeconds += 1;

      const loadingTime =
        document.getElementById("loadingTime");

      if(loadingTime){

        loadingTime.textContent =
          `Time elapsed: ${formatElapsedTime(elapsedSeconds)}`;

      }

    }, 1000);

    try{

      /*
      IMPORTANT:

      text/plain is used instead of application/json.

      This prevents the browser from sending the OPTIONS
      preflight request that was being blocked by CORS.
      */

      const response = await fetch(

        WEBHOOK_URL,

        {

          method:"POST",

          headers:{

            "Content-Type":"text/plain;charset=UTF-8"

          },

          body:
            JSON.stringify(payload)

        }

      );

      if(!response.ok){

        const errorText =
          await response.text();

        throw new Error(
          `Webhook returned HTTP ${response.status}: ${errorText || response.statusText}`
        );

      }

      const responseText =
        await response.text();

      if(!responseText){

        throw new Error(
          "The webhook completed but returned an empty response."
        );

      }

      let data;

      try{

        data =
          JSON.parse(responseText);

      } catch(error){

        console.error(
          "Non-JSON webhook response:",
          responseText
        );

        throw new Error(
          "The webhook returned a response that was not valid JSON."
        );

      }

      console.log(
        "FULL RESPONSE:",
        data
      );

      /*
      Return Report currently responds with:

      {
        success: true,
        report: {...}
      }
      */

      const report =
        data.report ||
        data.body?.report ||
        data;

   /*
Save every discovered source for source-library.html
*/

const sourceDatabase =
  Array.isArray(data.source_database)
    ? data.source_database
    : Array.isArray(report.source_table)
      ? report.source_table
      : [];

localStorage.setItem(
  "sourceDatabase",
  JSON.stringify(sourceDatabase)
);

console.log(
  "SAVED SOURCE DATABASE:",
  sourceDatabase
);
      if(!report || typeof report !== "object"){

        throw new Error(
          "The webhook returned no report object."
        );

      }

      let html = `

        <h2>
          Market Research Report
        </h2>

        <h3>
          Executive Summary
        </h3>

        <p>
          ${clean(report.executive_summary)}
        </p>

      `;


      // EXPOSURE ANALYSIS

      if(report.exposure_analysis){

        const visibility =
          report.exposure_analysis.source_visibility || {};

        html += `

          <h3>
            Exposure Analysis
          </h3>

          <div class="exposure">

            <div class="score">
              ${clean(report.exposure_analysis.exposure_score || 0)}/100
            </div>

            <p>
              <b>Measurement Basis:</b><br>
              ${clean(report.exposure_analysis.measurement_basis)}
            </p>

            <p>
              <b>Total Sources Found:</b>
              ${clean(visibility.total_sources_found || 0)}
            </p>

            <p>
              <b>Retailer Sources:</b>
              ${clean(visibility.retailer_sources || 0)}
            </p>

            <p>
              <b>Video Reviews:</b>
              ${clean(visibility.video_sources || 0)}
            </p>

            <p>
              <b>Forum Discussions:</b>
              ${clean(visibility.forum_sources || 0)}
            </p>

            <p>
              <b>Blog Sources:</b>
              ${clean(visibility.blog_sources || 0)}
            </p>

            <p>
              <b>Social Media Sources:</b>
              ${clean(visibility.social_media_sources || 0)}
            </p>

            <p>
              <b>Web Article Sources:</b>
              ${clean(visibility.web_article_sources || 0)}
            </p>

            <p>
              <b>Media Presence:</b><br>
              ${clean(report.exposure_analysis.media_presence)}
            </p>

            <p>
              <b>Social Presence:</b><br>
              ${clean(report.exposure_analysis.social_presence)}
            </p>

            <p>
              <b>Confidence:</b>
              ${clean(report.exposure_analysis.confidence)}
            </p>

          </div>

        `;

      }


      // CONFIRMED FINDINGS

      html += `

        <h3>
          Confirmed Findings
        </h3>

      `;

      const confirmedFindings =
        Array.isArray(report.confirmed_findings)
          ? report.confirmed_findings
          : [];

      if(confirmedFindings.length === 0){

        html += `
          <p>No confirmed findings were returned.</p>
        `;

      }

      confirmedFindings.forEach((item,index) => {

        const sourceUrl =
          safeUrl(item.source_url);

        html += `

          <div class="source">

            <strong>
              ${index + 1}. ${clean(item.finding)}
            </strong>

            <p>
              <b>Evidence Type:</b>
              ${clean(item.evidence_type)}
            </p>

            <p>
              <b>Market Area:</b>
              ${clean(item.market_area)}
            </p>

            <p>
              <b>Evidence:</b>
              ${clean(item.evidence_excerpt)}
            </p>

            <p>
              <b>Confidence:</b>
              ${clean(item.confidence)}
            </p>

            ${
              sourceUrl !== "#"
                ? `
                  <a
                    href="${clean(sourceUrl)}"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    View Source
                  </a>
                `
                : `<p>Source URL unavailable.</p>`
            }

          </div>

        `;

      });


      // POSITIVE FEEDBACK

      html += `

        <h3>
          Positive Feedback
        </h3>

      `;

      const positiveFeedback =
        Array.isArray(report.positive_feedback)
          ? report.positive_feedback
          : [];

      if(positiveFeedback.length === 0){

        html += `
          <p>No positive feedback was returned.</p>
        `;

      }

      positiveFeedback.forEach(item => {

        const sourceUrl =
          safeUrl(item.source_url);

        html += `

          <div class="source">

            <strong>
              ${clean(item.finding)}
            </strong>

            <p>
              ${clean(item.evidence_excerpt)}
            </p>

            ${
              sourceUrl !== "#"
                ? `
                  <a
                    href="${clean(sourceUrl)}"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    View Source
                  </a>
                `
                : ""
            }

          </div>

        `;

      });


      // NEGATIVE FEEDBACK

      html += `

        <h3>
          Negative Feedback
        </h3>

      `;

      const negativeFeedback =
        Array.isArray(report.negative_feedback)
          ? report.negative_feedback
          : [];

      if(negativeFeedback.length === 0){

        html += `
          <p>No negative feedback was returned.</p>
        `;

      }

      negativeFeedback.forEach(item => {

        const sourceUrl =
          safeUrl(item.source_url);

        html += `

          <div class="source">

            <strong>
              ${clean(item.finding)}
            </strong>

            <p>
              <b>Evidence:</b>
              ${clean(item.evidence_excerpt)}
            </p>

            ${
              sourceUrl !== "#"
                ? `
                  <a
                    href="${clean(sourceUrl)}"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    View Source
                  </a>
                `
                : ""
            }

          </div>

        `;

      });


      // MARKET GAPS

      html += `

        <h3>
          Market Gaps
        </h3>

      `;

      const marketGaps =
        Array.isArray(report.market_gaps)
          ? report.market_gaps
          : [];

      if(marketGaps.length === 0){

        html += `
          <p>No market gaps were returned.</p>
        `;

      }

      marketGaps.forEach(item => {

        const finding =
          typeof item === "string"
            ? item
            : item.finding;

        html += `

          <div class="source">
            ${clean(finding)}
          </div>

        `;

      });


      // IMPLICATIONS

      if(
        Array.isArray(report.implications) &&
        report.implications.length > 0
      ){

        html += `

          <h3>
            Business Implications
          </h3>

        `;

        report.implications.forEach(item => {

          const finding =
            typeof item === "string"
              ? item
              : item.finding;

          html += `

            <div class="source">
              ${clean(finding)}
            </div>

          `;

        });

      }


      // LIMITATIONS

      if(
        Array.isArray(report.limitations) &&
        report.limitations.length > 0
      ){

        html += `

          <h3>
            Limitations
          </h3>

        `;

        report.limitations.forEach(item => {

          const finding =
            typeof item === "string"
              ? item
              : item.finding;

          html += `

            <div class="source">
              ${clean(finding)}
            </div>

          `;

        });

      }


      // SOURCE TABLE

      html += `

        <h3>
          Sources
        </h3>

      `;

      const sourceTable =
        Array.isArray(report.source_table)
          ? report.source_table
          : [];

      if(sourceTable.length === 0){

        html += `
          <p>No source table was returned.</p>
        `;

      }

      sourceTable.forEach((source,index) => {

        const sourceUrl =
          safeUrl(source.url);

        html += `

          <div class="source">

            <strong>
              Source ${index + 1}
            </strong>

            <p>
              ${clean(source.title || "Unknown source")}
            </p>

            <p>
              <b>Source Type:</b>
              ${clean(source.source_type)}
            </p>

            <p>
              <b>Published Date:</b>
              ${clean(source.published_date || "Unknown")}
            </p>

            <p>
              <b>Reliability:</b>
              ${clean(source.reliability_level)}
            </p>

            ${
              sourceUrl !== "#"
                ? `
                  <a
                    href="${clean(sourceUrl)}"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    Open Source
                  </a>
                `
                : `<p>Source URL unavailable.</p>`
            }

          </div>

        `;

      });

      output.innerHTML = html;

    } catch(error){

      console.error(
        "Research request failed:",
        error
      );

      output.innerHTML = `

        <h3>
          Error
        </h3>

        <p>
          ${clean(error.message)}
        </p>

        <p>
          ${
            WEBHOOK_URL.includes("/webhook-test/")
              ? "Make sure you clicked “Listen for test event” in n8n before running the website."
              : "Check that the n8n workflow is active and the production webhook URL is correct."
          }
        </p>

      `;

    } finally{

      clearInterval(timer);

      runButton.disabled = false;
      runButton.textContent = "Run Research";

    }

  };

</script>

</body>

</html>
